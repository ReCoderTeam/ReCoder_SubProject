<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전자 결제</title>

    <!-- 폰트 적용 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">

    <!-- CSS 파일 연결 -->
    <link rel="stylesheet" th:href="@{/css/common/header.css}">
    <link rel="stylesheet" th:href="@{/css/common/footer.css}">
    <link rel="stylesheet" th:href="@{/css/common/style.css}">
    <style>
        html, body {
            height: 100%; /* 전체 페이지 높이를 100%로 설정 */
            margin: 0; /* 기본 여백 제거 */
            padding: 0; /* 기본 여백 제거 */
            box-sizing: border-box; /* 요소 크기 계산 방식 설정 */
            overflow: hidden; /* 스크롤바 숨기기 */
        }

        section{
            height: 100%;
            flex-grow: 1;
            margin: 0 11%;
        }

        .container {
            display: flex; /* 플렉스 레이아웃 사용 */
            flex-direction: row; /* 가로 방향으로 정렬 */
            height: 100%; /* 컨테이너 높이를 화면 전체로 설정 */

        }
        .sidebar {
            width: 20%; /* 사이드바 너비 */
            border-right: 1px solid black; /* 오른쪽 경계선 */
            padding: 20px; /* 내부 여백 */
            overflow-y: auto; /* 사이드바 내용이 넘칠 경우 스크롤 */
        }

        .sidebar-title {
            font-size: 32px; /* 글씨 크기 */
            font-weight: bold; /* 글씨 굵게 */
            color: #000; /* 글씨 색상 */
            margin-bottom: 15px; /* 아래 여백 */
            margin-top: 46px; /* 리스트 위치 아래로 조정 */
            text-align: center; /* 텍스트 중앙 정렬 */
        }

        .sidebar ul {
            margin-top: 10px; /* 리스트 위치 아래로 조정 */
            list-style: none; /* 리스트 기본 스타일 제거 */
            padding: 0; /* 내부 여백 제거 */
            text-align: center; /* 텍스트 중앙 정렬 */
        }
        .sidebar li {
            position: relative; /* 가상 요소 기준 위치 설정 */
            padding: 10px 0; /* 리스트 항목 상하 여백 */
            cursor: pointer; /* 마우스 커서 설정 */
        }
        .sidebar li::after {
            content: ''; /* 구분 바 추가 */
            display: block; /* 블록 형태로 설정 */
            width: 35%; /* 구분 바 길이 */
            height: 2px; /* 구분 바 굵기 */
            background-color: black; /* 구분 바 색상 */
            margin: 5px auto 0; /* 중앙 정렬 및 여백 */
        }
        .sidebar li:last-child::after {
            display: none; /* 마지막 항목 구분 바 제거 */
        }
        .sidebar li:hover {
            font-family: 'Noto Sans KR', Arial, sans-serif; /* 마우스 오버 시 폰트 */
            color: #5C1915; /* 마우스 오버 시 텍스트 색상 */
            font-weight: 1000; /* 마우스 오버 시 굵기 */
        }

        /* 등록 버튼 */
        .submit-btn {
            background-color: #5C1915;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: #7e2411;
        }

        /* Main Content 스타일 */
        .form-container {
            flex: 1; /* 남은 공간 모두 차지 */
            padding: 20px; /* 내부 여백 */
            display: flex;
            flex-direction: column; /* 세로 방향 정렬 */
            align-items: flex-start; /* 왼쪽 정렬 */
            justify-content: flex-start; /* 위쪽 정렬 */
        }

        #freeInquiryForm{
            height: 100%;
            display: flex;
            flex-direction: column;
            width: 100%;
            justify-content: space-between;

            .inquiryRegist_topBox{
                flex: 1;
                width: 100%;

                display: flex;
                flex-direction: column;

                .button-group {
                    width: 100%;
                    text-align: right;
                    margin-top: 10px;
                    height: fit-content;
                }

                .form-group {
                    width: 100%;
                    height: 5%;
                    margin-bottom: 15px;
                    display: flex;
                    align-items: center;


                    label{
                        width: 10%;
                        text-align: center;
                    }

                    input, select{
                        width: 80%;
                        padding: 5px 10px;
                        box-sizing: border-box;
                    }
                }

                .form-group + .content{
                    flex: 1;

                    label{
                        width: 10%;
                        height: 100%;
                        display: flex;
                        justify-content: center;
                    }
                    textarea{
                        width: 80%;
                        height: 99%;
                        padding: 5px 10px;
                        box-sizing: border-box;
                    }
                }
            }

                    .container{
                        width: 100%;
                        height: 100%;

                        display: flex;
                        flex-direction: column;
                    }
                }
            }
        }

                        input{
                            padding: 5px 0;
                        }

                        button {
                            margin-left: 10px; /* 삭제 버튼과 입력 필드 간격 */
                            background-color: red; /* 버튼 배경색 */
                            color: white; /* 버튼 글씨 색 */
                            border: none; /* 버튼 테두리 없애기 */
                            padding: 5px 10px; /* 버튼 크기 설정 */
                            cursor: pointer; /* 마우스 커서 */
                        }

    </style>
</head>
<body>
<header th:replace="~{/common/header::headerFragment}"></header>
<section>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-title">1:1 문의</div>


            <ul>
                <li>1:1 문의하기</li>
                <li>문의 내역</li>
            </ul>
        </div>

        <div class="form-container">
            <form id="freeInquiryForm" action="/inquiry/freeInquiryForm" method="post">

                <div class="inquiryRegist_topBox">

                    <!-- 제출 버튼 -->
                    <div class="button-group">
                        <button type="submit" class="submit-btn">등 록</button>
                    </div>

                    <!-- 제목 -->
                    <div class="form-group">
                        <label for="title">제목:</label>
                        <input type="text" id="title" name="title">
                    </div>

                    <!-- 분류 -->
                    <div class="form-group">
                        <label for="categoryCode">분류:</label>
                        <select id="categoryCode" name="categoryCode" onchange="onChangeSelectOption()">
                        </select>
                    </div>

                    <!-- 내용 -->
                    <div class="form-group content">
                        <label for="content">내용:</label>
                        <textarea id="content" name="content"></textarea>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>
<footer th:replace="~{/common/footer::footerFragment}"></footer>
</body>
</html>
