<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회의실 예약 입력 폼</title>
    <!--폰트 적용-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/common/header.css}">
    <link rel="stylesheet" th:href="@{/css/common/footer.css}">
    <link rel="stylesheet" th:href="@{/css/common/style.css}">

    <style>
        html, body {
            height: 100%; /* 전체 페이지 높이를 100%로 설정 */
            margin: 0; /* 페이지 외부 여백 제거 */
            padding: 0; /* 페이지 내부 여백 제거 */
            box-sizing: border-box; /* 요소 크기 계산 방식을 테두리 포함으로 설정 */
            overflow: hidden; /* 스크롤바를 숨김 */
        }

        .container {
            display: flex;
            flex-direction: row;
            height: 100vh; /* 뷰포트 높이에 맞춤 */
            overflow: hidden; /* 전체 스크롤은 숨김 */
        }

        .sidebar {
            width: 20%; /* 사이드바 너비를 화면의 20%로 설정 */
            border-right: 1px solid black; /* 오른쪽 경계선을 검은색으로 추가 */
            padding: 20px; /* 내부 여백 설정 */
            overflow-y: auto; /* 내용이 넘칠 경우 수직 스크롤바 추가 */
        }

        .sidebar-title {
            font-size: 32px; /* 제목 글꼴 크기 설정 */
            font-weight: bold; /* 제목 글꼴을 굵게 설정 */
            color: #000; /* 제목 색상을 검은색으로 설정 */
            margin-bottom: 15px; /* 아래 여백 설정 */
            margin-top: 46px; /* 위쪽 여백 설정 */
            text-align: center; /* 텍스트 중앙 정렬 */
        }

        .sidebar ul {
            margin-top: 10px; /* 리스트의 상단 여백 설정 */
            list-style: none; /* 리스트 스타일 제거 */
            padding: 0; /* 내부 여백 제거 */
            text-align: center; /* 리스트 항목을 중앙 정렬 */
            font-size: 18px;
        }

        .sidebar li {
            position: relative; /* 가상 요소 위치를 설정하기 위한 기준 위치 */
            padding: 10px 0; /* 리스트 항목의 상하 여백 설정 */
            cursor: pointer; /* 마우스 커서를 포인터로 변경 */
        }

        .sidebar li::after {
            content: ''; /* 구분선을 추가하기 위한 가상 요소 */
            display: block; /* 블록 요소로 설정 */
            width: 45%; /* 구분선 길이를 리스트 항목 너비의 45%로 설정 */
            height: 2px; /* 구분선 두께 설정 */
            background-color: black; /* 구분선 색상을 검은색으로 설정 */
            margin: 5px auto 0; /* 구분선을 중앙 정렬 및 여백 추가 */
        }

        .sidebar li:last-child::after {
            display: none; /* 마지막 항목의 구분선을 제거 */
        }

        .sidebar li:hover {
            font-family: 'Noto Sans KR', Arial, sans-serif; /* 마우스 오버 시 글꼴 설정 */
            color: #5C1915; /* 마우스 오버 시 글씨 색상 설정 */
            font-weight: 1000; /* 마우스 오버 시 글씨 굵게 설정 */
        }

        .sidebar li a {
            text-decoration: none; /* 링크 밑줄 제거 */
            color: inherit; /* 부모 요소의 색상을 상속 */
            font-weight: inherit; /* 부모 요소의 글씨 굵기 상속 */
            font-family: inherit; /* 부모 요소의 글꼴 상속 */
        }

        .sidebar li a:hover {
            color: #5C1915; /* 마우스 오버 시 링크 색상 설정 */
            font-weight: bold; /* 마우스 오버 시 링크 굵게 설정 */
        }

        section {
            flex:1;
            overflow-y: auto; /* 수직 스크롤 가능 */
        }

    </style>

</head>
<body>
<header th:replace="~{/common/header::headerFragment}"></header>
<section>
<div class="container">
    <div class="sidebar">
        <div class="sidebar-title">회의실 목록</div>
        <ul>
            <li th:onclick="|location.href='@{/user/booking}'|">예약 하기</li>
            <li th:onclick="|location.href='@{/booking/bookingList}'|">예약 내역</li>
        </ul>
    </div>

    <div class="main-content-wrap">
        <div class="main-content" id="roomList">
            <!-- JavaScript 로 회의실 정보가 추가됩니다. -->
        </div>


    <form action="/reserve" method="post">
        <input type="hidden" name="conferenceRoomNo" th:value="${roomNo}">
        <label for="empId">사번번호:</label>
        <input type="hidden" name="empId" th:value="${session.LoginUserInfo.empId}">
        <br>
        <label for="reservationDate">예약날짜:</label>
        <input type="date" id="reservationDate" name="reservationDate" required>
        <br><label for="reservationStartTime">시작시간:</label>
        <div id="button">
            <button>10:00</button>
            <button>11:00</button>
            <button>12:00</button>
            <button>13:00</button>
            <button>14:00</button>
            <button>15:00</button>
            <button>16:00</button>
            <button>17:00</button>
            <button>18:00</button>
        <br>
        <input type="time" id="reservationStartTime" name="reservationStartTime" required>
        <br>
        <input type="time" id="reservationEndTime" name="reservationEndTime" required>
        <br>
        </div>
        <button type="submit">예약</button>
    </form>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                // 시작 시간 버튼 클릭 이벤트
                const startButtons = document.querySelectorAll('#button button');
                const endTimeInput = document.getElementById('reservationEndTime');

                startButtons.forEach(button => {
                    button.addEventListener('click', function(event) {
                        // 선택된 시작 시간
                        const selectedStartTime = event.target.textContent;
                        // 시작 시간 입력 필드에 값 설정
                        document.getElementById('reservationStartTime').value = selectedStartTime;

                        // 종료 시간 설정 (시작 시간 + 1시간 후로 설정)
                        const startHour = parseInt(selectedStartTime.split(':')[0]);
                        const endHour = (startHour + 1) % 24; // 24시간 형식으로 조정
                        endTimeInput.value = endHour.toString().padStart(2, '0') + ':00';

                        // 모든 버튼의 스타일 초기화
                        startButtons.forEach(btn => {
                            btn.style.backgroundColor = '';
                            btn.style.color = '';
                        });

                        // 선택된 버튼 강조 표시
                        event.target.style.backgroundColor = '#5C1915';
                        event.target.style.color = '#fff';  // 텍스트 색상 변경
                    });
                });

                // 종료 시간 입력 필드에 클릭 이벤트 추가
                const endTimeInputs = document.querySelectorAll('input[type="time"]');
                endTimeInputs.forEach(input => {
                    input.addEventListener('focus', function() {
                        // 모든 버튼의 스타일 초기화
                        startButtons.forEach(btn => {
                            btn.style.backgroundColor = '';
                            btn.style.color = '';
                        });
                    });
                });
            });
        </script>
</div>
</div>
</section>
<footer th:replace="~{/common/footer::footerFragment}"></footer>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // URL에서 쿼리 파라미터 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const roomNo = urlParams.get('roomNo');

        // 회의실 데이터 배열
        const rooms = [
            { roomNo: 101, name: "제 1 회의실", location: "4F 홍보부 옆", facilities: "화이트 보드, 빔 프로젝트", imageUrl: "/images/회의실1.jpeg" },
            { roomNo: 202, name: "제 2 회의실", location: "4F 홍보부 옆", facilities: "화이트 보드, 빔 프로젝트", imageUrl: "/images/회의실2.jpg" },
            { roomNo: 403, name: "제 3 회의실", location: "4F 홍보부 옆", facilities: "화이트 보드, 빔 프로젝트", imageUrl: "/images/회의실3.jpg" },
            { roomNo: 504, name: "제 4 회의실", location: "4F 홍보부 옆", facilities: "화이트 보드, 빔 프로젝트", imageUrl: "/images/회의실4.jpg" },
            { roomNo: 805, name: "제 5 회의실", location: "4F 홍보부 옆", facilities: "화이트 보드, 빔 프로젝트", imageUrl: "/images/회의실5.jpg" }
        ];

        // 해당 회의실 정보 찾기
        const room = rooms.find(r => r.roomNo == roomNo);

        // 회의실 정보가 존재하는 경우에만 표시
        if (room) {
            const roomListElement = document.getElementById('roomList');
            roomListElement.innerHTML = `
                <div class="room-img-content-flex">
                    <div class="room-img-content">
                        <img src="${room.imageUrl}" alt="${room.name}">
                    </div>
                    <div class="room-text-content">
                        <h3>${room.name}</h3>
                        <p>위치 : ${room.location}</p>
                        <p>구성 : ${room.facilities}</p>
                    </div>
                </div>
            `;
            // 회의실 번호를 입력 폼에 설정
            document.getElementById('conferenceRoomNo').value = room.roomNo;
        } else {
            // 회의실 정보가 없을 경우 메시지 표시
            document.getElementById('roomList').innerHTML = '<p>선택한 회의실 정보가 없습니다.</p>';
        }
    });
</script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // CSS 스타일을 담을 style 태그 생성
        const style = document.createElement('style');
        style.innerHTML = `
            .main-content-wrap {
                height: 80vh; /* 가상의 창 높이 설정 */
                overflow-y: auto; /* 스크롤 가능 */
                flex: 1; /* 남은 공간을 차지 */
                padding: 20px;
            }

            .main-content {
                display: flex;
                flex-direction: column;
                align-content: center;
            }

            .room-img-content-flex {
                display: flex;
                align-items: flex-start;
                border: 1px solid #ccc;
                border-radius: 8px;
                padding: 10px;
                margin-bottom: 20px; /* 여백 추가 */
                background-color: #f9f9f9; /* 배경색 추가 */
            }

            .room-img-content {
                padding-left: 5px;
                align-self: center;
                margin-left: 20px;
                margin-right: 20px; /* 오른쪽 여백 조정 */
            }

            .room-text-content {
                flex: 1;
                margin-bottom: 10px;
            }

            .room-img-content-flex img {
                width: 200px; /* 이미지 너비 조정 */
                height: auto; /* 자동 높이 */
                border-radius: 8px;
                display: block;
            }

            .room-img-content-flex div {
                max-width: 55%; /* 텍스트 컨텐츠의 최대 너비 설정 */
            }

            .room-img-content-flex h3 {
                font-size: 24px;
                color: #333;
            }

            .room-img-content-flex p {
                font-size: 16px;
                color: #666;
            }
        `;

        // 생성한 스타일을 head에 추가
        document.head.appendChild(style);
    });
</script>
</body>
</html>
